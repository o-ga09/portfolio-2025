name: Validate Blog Post

on:
  pull_request:
    paths:
      - "contents/**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate changed posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed post files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            contents/**/*.md

      - name: Install pnpm
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate frontmatter / OGP fields
        if: steps.changed-files.outputs.any_changed == 'true'
        run: node scripts/validate-blog-post.js ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Proofread with textlint
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npx textlint ${{ steps.changed-files.outputs.all_changed_files }}
